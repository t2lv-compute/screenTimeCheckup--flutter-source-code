<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Stay aware of how you spend your screen time.">
  <!-- CSP: restrict script/style sources; 'unsafe-inline' required by Flutter's dynamic style injection;
       'wasm-unsafe-eval' required by Flutter WebAssembly. Note: frame-ancestors / cookie directives
       require HTTP headers — not enforceable from a meta tag on GitHub Pages. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'wasm-unsafe-eval' blob: https://www.gstatic.com;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: blob:;
                 worker-src 'self' blob:;
                 connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com;
                 object-src 'none';
                 base-uri 'self';">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Screen Time Checkup">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Preconnect to Google Fonts CDN to avoid Noto Color Emoji fetch failures -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>screen_time_checkup</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="sw_intercept.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
